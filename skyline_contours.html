<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skyline Contours</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      font-family: system-ui, sans-serif;
      color: #ccc;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Upload screen ──────────────────────────────────────── */

    #upload-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    #drop-zone {
      border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 64px 88px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      user-select: none;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.04);
    }
    #drop-zone p {
      font-size: 17px;
      opacity: 0.6;
      margin-bottom: 20px;
      letter-spacing: 0.05em;
    }
    #drop-zone label {
      font-size: 12px;
      letter-spacing: 0.12em;
      padding: 10px 28px;
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      display: inline-block;
    }
    #drop-zone label:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.5);
    }
    #file-input { display: none; }

    /* ── Canvas screen ──────────────────────────────────────── */

    #canvas-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    #canvas-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 12px 12px 0;
    }

    #output {
      display: block;
      box-shadow: 0 6px 40px rgba(0,0,0,0.7);
    }

    /* ── Bottom bar ─────────────────────────────────────────── */

    #bottom-bar {
      flex-shrink: 0;
      height: 56px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    #bottom-bar label {
      font-size: 11px;
      letter-spacing: 0.12em;
      opacity: 0.55;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 200px;
      height: 3px;
      background: rgba(255,255,255,0.18);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 15px; height: 15px;
      background: #cccccc;
      border-radius: 50%;
      cursor: pointer;
    }

    #error-label {
      font-size: 11px;
      min-width: 36px;
      opacity: 0.45;
      letter-spacing: 0.06em;
    }

    #hint-text {
      font-size: 10px;
      letter-spacing: 0.1em;
      opacity: 0.28;
      margin-left: 18px;
    }

    /* ── Processing overlay ─────────────────────────────────── */
    #processing {
      position: fixed;
      inset: 0;
      background: rgba(26,26,26,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      letter-spacing: 0.15em;
      opacity: 0.7;
    }
  </style>
</head>
<body>

<!-- STATE A: Upload -->
<div id="upload-screen">
  <div id="drop-zone">
    <p>Drop a skyline photo here</p>
    <label for="file-input">CHOOSE FILE</label>
    <input type="file" id="file-input" accept="image/*">
  </div>
</div>

<!-- STATE B: Canvas + controls -->
<div id="canvas-screen">
  <div id="canvas-wrapper">
    <canvas id="output"></canvas>
  </div>
  <div id="bottom-bar">
    <label for="error-slider">ERROR</label>
    <input type="range" id="error-slider" min="0" max="100" value="30">
    <span id="error-label">30%</span>
    <span id="hint-text">SPACE → REGENERATE</span>
  </div>
</div>

<div id="processing">RENDERING…</div>

<script>
// ── Physical / canvas constants ────────────────────────────────────────────

const PX_PER_MM    = 5;
const CANVAS_W     = 210 * PX_PER_MM;          // 1050 logical px  (A4 width)
const CANVAS_H     = 297 * PX_PER_MM;          // 1485 logical px  (A4 height)
const MARGIN_PX    = 10 * PX_PER_MM;           // 50px — border margin
const FIRST_LINE_Y = CANVAS_H - 50 * PX_PER_MM;// 1235px — 5cm from bottom
const GAP_PX       = 1.6 * PX_PER_MM;          // 8px — gap between lines
// Line thickness for screen rendering. Print spec is 0.01mm = 0.05px (invisible
// on screen), so we scale up to 1.5px base while keeping the 50–250% variation.
const BASE_THICK   = 1.5;                       // logical px — screen-friendly base
const DRAW_W       = CANVAS_W - 2 * MARGIN_PX; // 950 — drawable column count

// ── Canvas / DPR setup ────────────────────────────────────────────────────

const canvas = document.getElementById('output');
const ctx    = canvas.getContext('2d');
const DPR    = window.devicePixelRatio || 1;

canvas.width  = CANVAS_W * DPR;
canvas.height = CANVAS_H * DPR;
ctx.scale(DPR, DPR);

function sizeCanvasCSS() {
  const barH = 56, pad = 24;
  const maxH = window.innerHeight - barH - pad;
  const maxW = window.innerWidth  - pad;
  const ratio = CANVAS_W / CANVAS_H;
  const h = Math.min(maxH, maxW / ratio);
  const w = h * ratio;
  canvas.style.height = h + 'px';
  canvas.style.width  = w + 'px';
}
sizeCanvasCSS();
window.addEventListener('resize', sizeCanvasCSS);

// ── Application state ─────────────────────────────────────────────────────

let baseY         = null;   // Float32Array[DRAW_W] — first line y-values
let currentSeeds  = { drift: rndSeed(), thickness: rndSeed() };
let renderPending = false;

// ── PRNG: mulberry32 ──────────────────────────────────────────────────────

function mulberry32(seed) {
  let s = seed | 0;
  return function () {
    s = s + 0x6D2B79F5 | 0;
    let t = Math.imul(s ^ s >>> 15, 1 | s);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function rndSeed() { return (Math.random() * 0xFFFFFFFF) | 0; }

// ── Smooth noise (seeded sum-of-sines) ────────────────────────────────────

function generateSmoothNoise(length, seed) {
  const rng = mulberry32(seed);
  const N   = 6;
  const waves = [];
  for (let i = 0; i < N; i++) {
    waves.push({
      freq:  0.0015 + rng() * 0.012,   // long-range drift frequencies
      phase: rng() * Math.PI * 2,
      amp:   0.4 + rng() * 0.6
    });
  }
  const total = waves.reduce((s, w) => s + w.amp, 0);
  const out = new Float32Array(length);
  for (let i = 0; i < length; i++) {
    let v = 0;
    for (const w of waves) {
      v += w.amp * Math.sin(i * w.freq * Math.PI * 2 + w.phase);
    }
    out[i] = v / total;  // normalised [-1, 1]
  }
  return out;
}

// ── Sky detection ─────────────────────────────────────────────────────────

function getImagePixels(img) {
  const TARGET_W = 800;
  const w = TARGET_W;
  const h = Math.round(img.naturalHeight * TARGET_W / img.naturalWidth);
  const oc = document.createElement('canvas');
  oc.width = w; oc.height = h;
  oc.getContext('2d').drawImage(img, 0, 0, w, h);
  return { imageData: oc.getContext('2d').getImageData(0, 0, w, h), w, h };
}

function getBrightness(data, x, y, w) {
  const i = (y * w + x) * 4;
  return 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
}

function detectSkyline(imageData, w, h) {
  const d   = imageData.data;
  const raw = new Array(w);

  const WINDOW    = 18;
  const VAR_THRESH = 280;

  for (let x = 0; x < w; x++) {
    raw[x] = null;

    // Collect sky baseline (average of top 15% of column)
    const skyRows = Math.max(10, Math.floor(h * 0.15));
    let skySum = 0;
    for (let y = 0; y < skyRows; y++) skySum += getBrightness(d, x, y, w);
    const skyAvg = skySum / skyRows;

    for (let y = 0; y < h - WINDOW; y++) {
      // Method 1: variance spike (texture boundary)
      let sum = 0;
      const vals = new Float32Array(WINDOW);
      for (let dy = 0; dy < WINDOW; dy++) {
        vals[dy] = getBrightness(d, x, y + dy, w);
        sum += vals[dy];
      }
      const mean = sum / WINDOW;
      let variance = 0;
      for (let dy = 0; dy < WINDOW; dy++) {
        const diff = vals[dy] - mean;
        variance += diff * diff;
      }
      variance /= WINDOW;

      // Method 2: brightness drop from sky average
      const brightDrop = skyAvg - mean > 55;

      if (variance > VAR_THRESH || (y > h * 0.1 && brightDrop)) {
        raw[x] = y + WINDOW * 0.4;
        break;
      }
    }
  }

  // Forward fill nulls from left
  let last = null;
  for (let x = 0; x < w; x++) {
    if (raw[x] !== null) { last = raw[x]; }
    else if (last !== null) { raw[x] = last; }
  }
  // Backward fill remaining nulls from right
  last = null;
  for (let x = w - 1; x >= 0; x--) {
    if (raw[x] !== null) { last = raw[x]; }
    else if (last !== null) { raw[x] = last; }
  }
  // Final fallback: flat horizon at 60% from top
  for (let x = 0; x < w; x++) {
    if (raw[x] === null) raw[x] = h * 0.6;
  }

  return raw;
}

function smoothArray(arr, radius) {
  const out = new Array(arr.length);
  for (let i = 0; i < arr.length; i++) {
    const lo = Math.max(0, i - radius);
    const hi = Math.min(arr.length - 1, i + radius);
    let sum = 0;
    for (let j = lo; j <= hi; j++) sum += arr[j];
    out[i] = sum / (hi - lo + 1);
  }
  return out;
}

function mapSkylineToCanvas(skylineY, photoH) {
  // The skyline contour is centred on FIRST_LINE_Y and spans ±VERT_RANGE around it.
  const VERT_RANGE = 150;  // ±150px = ±30mm — enough room for detailed skylines
  const len    = skylineY.length;
  const minY   = Math.min(...skylineY);
  const maxY   = Math.max(...skylineY);
  const range  = Math.max(maxY - minY, 1);
  const result = new Float32Array(DRAW_W);
  for (let cx = 0; cx < DRAW_W; cx++) {
    const px         = Math.round(cx * (len - 1) / (DRAW_W - 1));
    const normalised = (skylineY[px] - minY) / range;   // 0..1
    result[cx] = FIRST_LINE_Y + (normalised - 0.5) * VERT_RANGE;
  }
  return result;
}

// ── Line generation with compounding drift ────────────────────────────────

function generateAllLines(base, errorFactor, seeds) {
  const lines     = [];
  const accDrift  = new Float32Array(DRAW_W);
  let prevThick   = 1.0;
  let driftSeed   = seeds.drift;
  const thickRng  = mulberry32(seeds.thickness);
  const DRIFT_AMP = GAP_PX * 1.4 * errorFactor;
  const REVERT    = 0.85;

  // Pre-allocate buffers for 2D offset curve + resampling (reused every line)
  const pts_x   = new Float32Array(DRAW_W);
  const pts_y   = new Float32Array(DRAW_W);
  const sortArr = new Array(DRAW_W);

  let currentY = new Float32Array(base);

  for (let safety = 0; safety < 800; safety++) {
    let maxY = 0;
    for (let i = 0; i < DRAW_W; i++) if (currentY[i] > maxY) maxY = currentY[i];
    if (maxY <= 0) break;

    driftSeed = (Math.imul(driftSeed, 1664525) + 1013904223) | 0;
    const inc = generateSmoothNoise(DRAW_W, driftSeed);

    for (let i = 0; i < DRAW_W; i++) {
      accDrift[i] = accDrift[i] * REVERT + inc[i] * DRIFT_AMP;
    }

    const t         = thickRng();
    const lineThick = 1.0 - 0.5 * errorFactor + t * 2.0 * errorFactor;
    const blended   = lineThick * 0.88 + prevThick * 0.12;
    prevThick = blended;

    const segRng = mulberry32(driftSeed ^ 0xBEEF1234);
    const yVals  = new Float32Array(DRAW_W);
    const thicks = new Float32Array(DRAW_W);

    // ── Step 1: compute 2D offset points along the surface normal ──────────
    // For each column i, move GAP_PX in the direction perpendicular (upward)
    // to the local tangent. Tangent = (1, s)/len → upward normal = (s, -1)/len.
    // Slope is clamped to ±SLOPE_CAP so that even at steep building edges the
    // vertical component of the normal is at least GAP_PX/sqrt(1+CAP²) ≈ 2.2px,
    // guaranteeing all columns advance upward fast enough to fill the canvas.
    const SLOPE_CAP = 1.5;
    for (let i = 0; i < DRAW_W; i++) {
      const iL  = Math.max(0, i - 4);
      const iR  = Math.min(DRAW_W - 1, i + 4);
      const raw = (currentY[iR] - currentY[iL]) / (iR - iL);
      const s   = Math.max(-SLOPE_CAP, Math.min(SLOPE_CAP, raw));
      const len = Math.sqrt(1 + s * s);
      pts_x[i] = i            + GAP_PX * s / len;   // x shifts along normal
      pts_y[i] = currentY[i] - GAP_PX / len;        // y moves upward along normal
    }

    // ── Step 2: sort offset points by their new x coordinate ───────────────
    // pts_x[i] ≈ i ± GAP_PX, so input is nearly sorted — TimSort is O(N).
    for (let i = 0; i < DRAW_W; i++) sortArr[i] = i;
    sortArr.sort((a, b) => pts_x[a] - pts_x[b]);

    // ── Step 3: resample to integer x columns via linear interpolation ──────
    // This blends adjacent offset points that moved toward the same x,
    // naturally eliminating the divergence that caused vertical streaks.
    let jj = 0;
    for (let xi = 0; xi < DRAW_W; xi++) {
      // Advance pointer so sortArr[jj] brackets xi from the left
      while (jj < DRAW_W - 2 && pts_x[sortArr[jj + 1]] <= xi) jj++;
      const ia = sortArr[jj];
      const ib = sortArr[Math.min(DRAW_W - 1, jj + 1)];
      const xa = pts_x[ia], xb = pts_x[ib];
      let baseVal;
      if (xb <= xa || xi <= xa) {
        baseVal = pts_y[ia];
      } else {
        const frac = Math.min(1, (xi - xa) / (xb - xa));
        baseVal = pts_y[ia] + frac * (pts_y[ib] - pts_y[ia]);
      }
      // Apply drift and clamp: this line must never cross (go below) currentY
      const rawY = baseVal + accDrift[xi];
      yVals[xi] = Math.min(currentY[xi], rawY);
      const segJitter = 1.0 + (segRng() - 0.5) * 0.44 * errorFactor;
      thicks[xi] = BASE_THICK * blended * segJitter;
    }

    // Smooth each line to round sharp building-edge corners.
    // Small radius (10px ≈ 1.25 gaps) removes kinks without losing skyline detail.
    const smoothY = new Float32Array(smoothArray(yVals, 10));
    lines.push({ y: smoothY, t: thicks });
    currentY = smoothY;
  }

  return lines;
}

// ── Rendering ─────────────────────────────────────────────────────────────

function drawLines(lines) {
  // White page background
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  ctx.strokeStyle = '#111111';
  ctx.lineCap     = 'round';

  // Batch segments by bucketed lineWidth to minimise stroke() calls.
  // ~280k segments → ~20-30 stroke() calls total.
  const BUCKET_COUNT = 24;
  const BUCKET_MAX   = 3.0;    // max expected lineWidth in logical px

  // Use typed flat arrays for each bucket (pre-allocate then trim)
  const bucketData = new Array(BUCKET_COUNT);
  const bucketSize = new Int32Array(BUCKET_COUNT);
  const MAX_SEGS   = lines.length * DRAW_W;   // upper bound per bucket
  // Shared pool to avoid massive individual allocations
  // We'll just use regular arrays and push() — fast enough for <300k entries
  for (let b = 0; b < BUCKET_COUNT; b++) bucketData[b] = [];

  const xOff = MARGIN_PX;

  for (const line of lines) {
    const { y: yVals, t: thicks } = line;
    for (let i = 0; i < DRAW_W - 1; i++) {
      const y0 = yVals[i], y1 = yVals[i + 1];
      // Skip segments that are entirely off the canvas (above or below).
      // Partially off-screen segments are kept — the canvas clips them naturally.
      if ((y0 < 0 && y1 < 0) || (y0 > CANVAS_H && y1 > CANVAS_H)) continue;
      const lw = thicks[i];
      const bk = Math.min(BUCKET_COUNT - 1,
                          Math.floor(lw / BUCKET_MAX * BUCKET_COUNT));
      bucketData[bk].push(xOff + i, y0, xOff + i + 1, y1);
    }
  }

  for (let b = 0; b < BUCKET_COUNT; b++) {
    const segs = bucketData[b];
    if (!segs.length) continue;
    const lw = (b + 0.5) / BUCKET_COUNT * BUCKET_MAX;
    ctx.beginPath();
    ctx.lineWidth = Math.max(0.35, lw);
    for (let j = 0; j < segs.length; j += 4) {
      ctx.moveTo(segs[j],     segs[j + 1]);
      ctx.lineTo(segs[j + 2], segs[j + 3]);
    }
    ctx.stroke();
  }
}

// ── Render pipeline ───────────────────────────────────────────────────────

function render() {
  if (!baseY) return;

  const errorFactor = document.getElementById('error-slider').value / 100;

  // Show the base (skyline) line with uniform thickness, then all contour lines
  const baseThick = new Float32Array(DRAW_W).fill(BASE_THICK);
  const allLines  = [
    { y: baseY, t: baseThick },
    ...generateAllLines(baseY, errorFactor, currentSeeds)
  ];

  drawLines(allLines);
}

function scheduleRender() {
  if (renderPending) return;
  renderPending = true;
  requestAnimationFrame(() => {
    renderPending = false;
    render();
  });
}

// ── Image loading ─────────────────────────────────────────────────────────

function handleImageLoad(file) {
  const proc = document.getElementById('processing');
  proc.style.display = 'flex';

  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      // Run detection off the next frame so the processing overlay shows
      setTimeout(() => {
        const { imageData, w, h } = getImagePixels(img);
        const rawY    = detectSkyline(imageData, w, h);
        const smoothY = smoothArray(rawY, 3);
        baseY = mapSkylineToCanvas(smoothY, h);

        document.getElementById('upload-screen').style.display = 'none';
        const cs = document.getElementById('canvas-screen');
        cs.style.display = 'flex';

        proc.style.display = 'none';
        scheduleRender();
      }, 30);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── Event wiring ──────────────────────────────────────────────────────────

const dropZone  = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const slider    = document.getElementById('error-slider');
const errLabel  = document.getElementById('error-label');

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) handleImageLoad(f);
});

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) handleImageLoad(e.target.files[0]);
});

slider.addEventListener('input', () => {
  errLabel.textContent = slider.value + '%';
  scheduleRender();
});

document.addEventListener('keydown', e => {
  if (e.code === 'Space' && baseY) {
    e.preventDefault();
    currentSeeds = { drift: rndSeed(), thickness: rndSeed() };
    scheduleRender();
  }
});

// Clicking the drop zone label opens file dialog (handled by <label for=...>)
</script>

</body>
</html>
