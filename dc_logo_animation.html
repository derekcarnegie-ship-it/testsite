<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DC Logo Animation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 28px;
      font-family: system-ui, sans-serif;
    }
    canvas {
      width: min(82vw, 82vh);
      height: min(82vw, 82vh);
    }
    button {
      padding: 10px 32px;
      border: 2px solid #162855;
      background: white;
      color: #162855;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    button:hover { background: #162855; color: white; }
  </style>
</head>
<body>

<canvas id="c" width="600" height="600"></canvas>
<button onclick="replay()">&#9654; Replay</button>

<script>
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');

  const W    = 600;
  const H    = 600;
  const CX   = 300;
  const CY   = 300;
  const R    = 220;          // circle radius (to stroke centre-line)
  const NAVY = '#162855';

  // ── Pre-generate stable brush texture noise ──────────────────────────
  // Using many small arc segments with slightly varying width, alpha, radius.
  const SEGS = 900;
  const brushNoise = Array.from({ length: SEGS }, (_, i) => ({
    w: 21 + Math.sin(i * 0.11) * 6 + (Math.random() - 0.5) * 5,   // width 15–27
    a: 0.70 + Math.random() * 0.30,                                  // alpha 0.70–1.0
    r: R + (Math.random() - 0.5) * 3.5                               // slight radius jitter
  }));

  // ── Easing helpers ───────────────────────────────────────────────────
  function easeInOut(t) { return t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t; }
  function easeOut(t)   { return 1 - (1 - t) * (1 - t); }
  function clamp(x, a, b) { return Math.max(a, Math.min(b, x)); }
  function prog(t, s, e) { return clamp((t - s) / (e - s), 0, 1); }

  let animId = null;
  let t0     = null;

  // ── Main render loop ─────────────────────────────────────────────────
  function drawFrame(ts) {
    if (!t0) t0 = ts;
    const t = (ts - t0) / 1000;   // elapsed seconds

    // Animation timeline
    //  0.2 → 1.4 s  : DC text fades in (navy)
    //  1.6 → 3.8 s  : circle stroke draws (brush style)
    //  3.9 → 5.0 s  : circle fill floods in; DC cross-fades navy → white

    const pText   = easeInOut(prog(t, 0.2, 1.4));
    const pCircle = easeOut(prog(t, 1.6, 3.8));
    const pFill   = easeInOut(prog(t, 3.9, 5.0));

    // ── Background ───────────────────────────────────────────────────
    ctx.clearRect(0, 0, W, H);

    // ── Circle fill (drawn below text, behind stroke visually) ───────
    if (pFill > 0) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(CX, CY, R + 10, 0, Math.PI * 2);
      ctx.fillStyle = NAVY;
      ctx.globalAlpha = pFill;
      ctx.fill();
      ctx.restore();
    }

    // ── Brush stroke circle ───────────────────────────────────────────
    if (pCircle > 0) {
      const visibleSegs = Math.floor(SEGS * pCircle);
      ctx.save();
      ctx.lineCap = 'round';
      for (let i = 0; i < visibleSegs; i++) {
        const a1 = -Math.PI / 2 + (Math.PI * 2 *  i      / SEGS);
        const a2 = -Math.PI / 2 + (Math.PI * 2 * (i + 1) / SEGS);
        const n  = brushNoise[i];
        ctx.beginPath();
        ctx.arc(CX, CY, n.r, a1, a2);
        ctx.strokeStyle = NAVY;
        ctx.lineWidth   = n.w;
        ctx.globalAlpha = n.a;
        ctx.stroke();
      }
      ctx.restore();
    }

    // ── DC text ───────────────────────────────────────────────────────
    ctx.save();
    ctx.font         = 'bold 248px Georgia, "Times New Roman", serif';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';

    // Navy DC — fades in first, fades out as fill arrives
    const navyAlpha = pText * (1 - pFill);
    if (navyAlpha > 0.005) {
      ctx.globalAlpha = navyAlpha;
      ctx.fillStyle   = NAVY;
      ctx.fillText('DC', CX, CY + 10);
    }

    // White DC — fades in with the fill
    if (pFill > 0.005) {
      ctx.globalAlpha = pFill;
      ctx.fillStyle   = 'white';
      ctx.fillText('DC', CX, CY + 10);
    }

    ctx.restore();

    if (t < 6.5) {
      animId = requestAnimationFrame(drawFrame);
    }
  }

  // ── Controls ──────────────────────────────────────────────────────────
  function replay() {
    if (animId) cancelAnimationFrame(animId);
    t0     = null;
    animId = requestAnimationFrame(drawFrame);
  }

  // Auto-start
  document.fonts.ready.then(() => {
    animId = requestAnimationFrame(drawFrame);
  });
</script>

</body>
</html>
