<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ball Animation — Interactive</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    canvas {
      border-radius: 16px;
      background: #1c1c1c;
      box-shadow: 0 30px 90px rgba(0,0,0,0.7);
      cursor: crosshair;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
c.width  = 520;
c.height = 520;

const W = c.width, H = c.height;
const R           = 20;
const FLOOR       = H;
const GRAVITY     = 0.6;
const RESTITUTION = 0.5;
const SETTLE_VEL  = 3.0;
const COLOR       = '#f0ece0';
const THIN_W      = 4;
const HALF_DIAG   = Math.sqrt(W * W + H * H) / 2;  // ≈ 367.7
const CY          = H / 2;                           // rotation centre y (always H/2)

const easeOutQuart = t => 1 - (1 - t) ** 4;
const easeInOut    = t => t < 0.5 ? 2 * t * t : 1 - (-2 * t + 2) ** 2 / 2;

// ── Ball pool ─────────────────────────────────────────────────────────────────

const balls = [];
let lastTs = 0;

function spawnBall(x, y, ts) {
  balls.push({
    bx:           x,
    by:           Math.min(y, FLOOR - R),
    vy:           0,
    state:        'pause',
    stateStart:   ts,
    lastBounceTs: -Infinity,
    stamps:       []
  });
}

function resetBall(ball, ts) {
  // Subsequent loops always begin at CY = H/2 (perfect loop geometry)
  ball.by           = CY;
  ball.vy           = 0;
  ball.state        = 'pause';
  ball.stateStart   = ts;
  ball.lastBounceTs = -Infinity;
  ball.stamps       = [];
}

// ── Per-ball draw helpers ─────────────────────────────────────────────────────

function deform(ball, ts) {
  const age = ts - ball.lastBounceTs;
  if (age < 160) {
    const f = 1 - age / 160;
    return { sx: 1 + 0.18 * f, sy: 1 - 0.18 * f };
  }
  const s = Math.min(Math.abs(ball.vy) * 0.006, 0.07);
  return { sx: 1 - s * 0.5, sy: 1 + s };
}

function drawBall(ball, sx = 1, sy = 1, y = ball.by) {
  ctx.save();
  ctx.translate(ball.bx, y);
  ctx.scale(sx, sy);
  ctx.shadowColor = 'rgba(240,236,224,0.3)';
  ctx.shadowBlur  = 18;
  const g = ctx.createRadialGradient(-R * 0.3, -R * 0.4, 1, 0, 0, R);
  g.addColorStop(0, '#ffffff');
  g.addColorStop(1, COLOR);
  ctx.beginPath();
  ctx.arc(0, 0, R, 0, Math.PI * 2);
  ctx.fillStyle = g;
  ctx.fill();
  ctx.restore();
}

function drawSpoke(ball, angle, len) {
  const halfW = THIN_W / 2;
  if (len <= halfW) return;
  const θ     = Math.asin(halfW / len);
  const yEdge = len * Math.cos(θ);
  ctx.save();
  ctx.translate(ball.bx, CY);
  ctx.rotate(angle);
  ctx.fillStyle = COLOR;
  ctx.beginPath();
  ctx.arc(0, 0, len, -Math.PI / 2 + θ, -Math.PI / 2 - θ, true);
  ctx.lineTo(-halfW, yEdge);
  ctx.arc(0, 0, len,  Math.PI / 2 + θ,  Math.PI / 2 - θ, true);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawBar(ball, w) {
  ctx.fillStyle = COLOR;
  ctx.fillRect(ball.bx - w / 2, 0, w, FLOOR);  // always full canvas height
}

// ── State machine (runs once per ball per frame) ───────────────────────────────

function tickBall(ball, ts) {
  const dt = ts - ball.stateStart;
  const go = s => { ball.state = s; ball.stateStart = ts; };

  switch (ball.state) {

    case 'pause': {
      drawBall(ball);
      if (dt > 750) go('fall');
      break;
    }

    case 'fall':
    case 'bounce': {
      ball.vy += GRAVITY;
      ball.by += ball.vy;
      if (ball.by + R >= FLOOR) {
        ball.by = FLOOR - R;
        if (Math.abs(ball.vy) < SETTLE_VEL) {
          ball.vy = 0; ball.lastBounceTs = ts; go('rest');
        } else {
          ball.vy = -ball.vy * RESTITUTION;
          ball.lastBounceTs = ts; go('bounce');
        }
      }
      const { sx, sy } = deform(ball, ts);
      drawBall(ball, sx, sy, sy < 1 ? ball.by + R * (1 - sy) : ball.by);
      break;
    }

    case 'rest': {
      const age = ts - ball.lastBounceTs;
      if (age < 160) {
        const f = 1 - age / 160;
        const sy = 1 - 0.18 * f, sx = 1 + 0.18 * f;
        drawBall(ball, sx, sy, ball.by + R * (1 - sy));
      } else {
        drawBall(ball);
      }
      if (dt > 550) go('grow');
      break;
    }

    case 'grow': {
      const t = Math.min(dt / 420, 1);
      const lineH = easeOutQuart(t) * FLOOR;
      drawBall(ball);
      ctx.fillStyle = COLOR;
      ctx.fillRect(ball.bx - R, FLOOR - lineH, R * 2, lineH);
      if (t >= 1) go('pause_wide');
      break;
    }

    case 'pause_wide': {
      drawBar(ball, R * 2);
      if (dt > 250) go('thin');
      break;
    }

    case 'thin': {
      const t = Math.min(dt / 300, 1);
      drawBar(ball, R * 2 + (THIN_W - R * 2) * easeInOut(t));
      if (t >= 1) go('pause_thin');
      break;
    }

    case 'pause_thin': {
      drawBar(ball, THIN_W);
      if (dt > 250) { ball.stamps = []; go('rotate'); }
      break;
    }

    case 'rotate': {
      const t     = Math.min(dt / 450, 1);
      const angle = t * Math.PI;
      while (ball.stamps.length < 18 && angle >= ball.stamps.length * (10 * Math.PI / 180)) {
        ball.stamps.push(ball.stamps.length * (10 * Math.PI / 180));
      }
      for (const a of ball.stamps) drawSpoke(ball, a, HALF_DIAG);
      if (t < 1) drawSpoke(ball, angle, HALF_DIAG);
      if (t >= 1) go('pause_circle');
      break;
    }

    case 'pause_circle': {
      for (let i = 0; i < 18; i++) drawSpoke(ball, i * (10 * Math.PI / 180), HALF_DIAG);
      if (dt > 700) go('retract');
      break;
    }

    case 'retract': {
      const t   = Math.min(dt / 700, 1);
      const len = HALF_DIAG + (R - HALF_DIAG) * easeOutQuart(t);
      for (let i = 0; i < 18; i++) drawSpoke(ball, i * (10 * Math.PI / 180), len);
      if (t >= 1) go('reform');
      break;
    }

    case 'reform': {
      drawBall(ball, 1, 1, CY);
      if (dt > 1800) resetBall(ball, ts);
      break;
    }
  }
}

// ── Main render loop ──────────────────────────────────────────────────────────

function animate(ts) {
  lastTs = ts;
  ctx.clearRect(0, 0, W, H);

  for (const ball of balls) tickBall(ball, ts);

  if (balls.length === 0) {
    ctx.fillStyle = 'rgba(240,236,224,0.18)';
    ctx.font = '14px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('click anywhere to spawn  ·  space to reset', W / 2, H / 2);
  }

  requestAnimationFrame(animate);
}

// ── Input ─────────────────────────────────────────────────────────────────────

c.addEventListener('click', e => {
  const r = c.getBoundingClientRect();
  const x = (e.clientX - r.left) * (W / r.width);
  const y = (e.clientY - r.top)  * (H / r.height);
  spawnBall(x, y, lastTs);
});

document.addEventListener('keydown', e => {
  if (e.key === ' ') { e.preventDefault(); balls.length = 0; }
});

requestAnimationFrame(animate);
</script>
</body>
</html>
